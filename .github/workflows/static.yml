<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Standart Hesaplayıcı Türkiye</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        
        <header class="app-header">
            <h1 id="app_title">Standart Hesaplayıcı</h1>
            <div class="progress-bar">
                <div id="progress_fill" class="progress-fill"></div>
            </div>
        </header>

        <div id="step_1" class="step active">
            <h2>Kimi arıyorsun?</h2>
            <div class="gender-selection">
                <button class="gender-btn" data-gender="male">Erkek Arıyorum</button>
                <button class="gender-btn" data-gender="female">Kadın Arıyorum</button>
            </div>
        </div>

        <div id="step_2" class="step">
            <h2>Adayın Yaşı</h2>
            <p class="subtitle">Hangi yaş aralığında olmalı?</p>
            <div class="input-row">
                <div class="input-group">
                    <label>Minimum</label>
                    <input type="number" id="min_age" min="18" max="80" value="20">
                </div>
                <div class="input-group">
                    <label>Maksimum</label>
                    <input type="number" id="max_age" min="18" max="80" value="30">
                </div>
            </div>
        </div>

        <div id="step_3" class="step">
            <h2 id="height_title">Minimum Boy</h2>
            <p class="subtitle">Boyu en az/en çok kaç cm olmalı?</p>
            <div class="slider-container">
                <div class="value-display"><span id="height_display">175</span> cm</div>
                <input type="range" id="height_slider" min="140" max="210" value="175">
            </div>
        </div>

        <div id="step_4" class="step">
            <h2>Aylık Gelir (TL)</h2>
            <p class="subtitle">Ekonomik beklentin nedir?</p>
            
            <div id="income_single_wrapper">
                <div class="value-display"><span id="income_display">50.000</span> TL</div>
                <input type="range" id="income_slider" min="17000" max="500000" step="5000" value="50000">
            </div>

            <div id="income_range_wrapper" class="hidden">
                <div class="input-row">
                    <div class="input-group">
                        <label>Minimum</label>
                        <input type="number" id="min_income_f" min="0" step="1000" value="17000">
                    </div>
                    <div class="input-group">
                        <label>Maksimum</label>
                        <input type="number" id="max_income_f" min="17000" step="1000" value="50000">
                    </div>
                </div>
            </div>
        </div>

        <div id="step_5" class="step">
            <h2>Ekstra Kriterler</h2>
            <p class="subtitle">Bu özellikleri filtrele.</p>
            
            <label class="checkbox-container">
                <span id="married_label">Evlileri Hariç Tut</span>
                <input type="checkbox" id="married_checkbox" checked>
                <span class="checkmark"></span>
            </label>

            <label class="checkbox-container">
                <span>Obezleri Hariç Tut</span>
                <input type="checkbox" id="exclude_obese">
                <span class="checkmark"></span>
            </label>
        </div>

        <div id="step_results" class="step results-step">
            <h2>Sonuçlar</h2>
            <p class="subtitle">Türkiye'de bu kriterlere uyan kişilerin oranı:</p>
            
            <div class="result-box">
                <div class="result-label">Olasılık</div>
                <div class="result-value" id="final_probability">0%</div>
            </div>

            <div class="result-box">
                <div class="result-label">Tahmini Kişi Sayısı</div>
                <div class="result-value" id="estimated_count">0</div>
            </div>
            
            <button id="restart_btn" class="nav-btn outline">Baştan Başla</button>
        </div>

        <div class="nav-controls" id="nav_controls">
            <button id="prev_btn" class="nav-btn outline hidden">Geri</button>
            <button id="next_btn" class="nav-btn primary hidden">İleri</button>
            <button id="calc_btn" class="nav-btn primary hidden">Hesapla</button>
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
