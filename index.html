<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Standard Calculator Turkey</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Standard Calculator</h1>
        <p>Find out the mathematical probability of your standards in Turkey.</p>

        <div class="calculator-form">
            <div class="form-group">
                <label for="target_gender">Target Gender:</label>
                <select id="target_gender">
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                </select>
            </div>

            <div class="form-group">
                <label>Age Range:</label>
                <div class="age-inputs">
                    <input type="number" id="min_age" min="18" max="80" value="20">
                    <span>to</span>
                    <input type="number" id="max_age" min="18" max="80" value="30">
                </div>
            </div>

            <div class="form-group">
                <label for="min_height">Minimum Height (cm): <span id="height_display">175</span></label>
                <input type="range" id="min_height" min="140" max="210" value="175">
            </div>

            <div class="form-group">
                <label for="min_income">Minimum Monthly Income (TRY): <span id="income_display">50000</span></label>
                <input type="range" id="min_income" min="17000" max="500000" step="5000" value="50000">
            </div>

            <div class="form-group checkbox-group">
                <input type="checkbox" id="exclude_married">
                <label for="exclude_married">Exclude Married</label>
            </div>

            <div class="form-group checkbox-group">
                <input type="checkbox" id="exclude_obese">
                <label for="exclude_obese">Exclude Obese</label>
            </div>

            <button id="calculate_btn">Calculate Probability</button>
        </div>

        <div id="results" class="results-section hidden">
            <h2>Results</h2>
            <p>Probability: <span id="final_probability">0%</span></p>
            <p>Estimated Pool: <span id="estimated_count">0</span> people</p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
